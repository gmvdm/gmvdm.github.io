<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — ZoneSlider</title>
  <link rel="shortcut icon" href="/appicon.png" type="image/png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-nav">
      <a href="/" class="logo-group">
        <img src="/appicon.png" alt="ZoneSlider Logo" class="logo-img">
        <span class="logo-title">Zone<span class="gradient-text">Slider</span></span>
      </a>
      <nav>
        <a href="/privacy.html" class="nav-link" id="nav-privacy">Privacy Policy</a>
      </nav>
    </div>
  </header>

  <!-- Content -->
  <main class="container">
    <section class="privacy-section">
      <article class="privacy-content">
        {{ content }}
      </article>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-left">
        <a href="/" class="footer-logo">
          <img src="/appicon.png" alt="" class="footer-logo-img">
          <span>ZoneSlider</span>
        </a>
        <p class="copyright">&copy; 2026 ZoneSlider. All rights reserved.</p>
      </div>
      <div class="footer-right">
        <a href="/privacy.html" class="footer-link">Privacy Policy</a>
      </div>
    </div>
  </footer>

</body>
</html>
